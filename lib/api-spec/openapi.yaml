openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin panel operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get system statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get all settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Setting"
    post:
      operationId: saveAdminSettings
      tags: [admin]
      summary: Save settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/balance:
    post:
      operationId: adjustUserBalance
      tags: [admin]
      summary: Adjust user balance
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BalanceAdjustInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /admin/transactions:
    get:
      operationId: getAdminTransactions
      tags: [admin]
      summary: Get transactions
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Transactions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /admin/gift-codes:
    get:
      operationId: getGiftCodes
      tags: [admin]
      summary: Get all gift codes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gift codes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GiftCode"
    post:
      operationId: createGiftCode
      tags: [admin]
      summary: Create a gift code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GiftCodeInput"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /admin/support/requests:
    get:
      operationId: getSupportRequests
      tags: [admin]
      summary: Get support requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Support requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportRequest"

  /admin/support/connect/{userId}:
    post:
      operationId: connectSupportUser
      tags: [admin]
      summary: Connect to support user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /admin/support/disconnect/{userId}:
    post:
      operationId: disconnectSupportUser
      tags: [admin]
      summary: Disconnect support user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /admin/support/reject/{userId}:
    post:
      operationId: rejectSupportUser
      tags: [admin]
      summary: Reject support user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    SettingsInput:
      type: object
      properties:
        settings:
          type: array
          items:
            $ref: "#/components/schemas/Setting"
      required: [settings]

    BalanceAdjustInput:
      type: object
      properties:
        amount:
          type: number
        reason:
          type: string
      required: [amount]

    GiftCodeInput:
      type: object
      properties:
        code:
          type: string
        amount:
          type: string
        maxUses:
          type: integer
      required: [code, amount, maxUses]

    LoginResult:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
      required: [success]

    OkResult:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required: [ok]

    Setting:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
      required: [key, value]

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeToday:
          type: integer
        totalDeposits:
          type: number
        totalWithdrawals:
          type: number
        totalBets:
          type: number
      required: [totalUsers, activeToday, totalDeposits, totalWithdrawals, totalBets]

    AdminUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        balance:
          type: string
        totalWagered:
          type: string
        referralCount:
          type: integer
        isBanned:
          type: boolean
        isAdmin:
          type: boolean
      required: [id, balance, totalWagered, isBanned, isAdmin]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
        amount:
          type: string
        method:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, userId, type, amount, status, createdAt]

    GiftCode:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        amount:
          type: string
        maxUses:
          type: integer
        usedCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
      required: [id, code, amount, maxUses, usedCount, isActive, createdAt]

    SupportRequest:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        firstName:
          type: string
        content:
          type: string
        status:
          type: string
        requestedAt:
          type: integer
        isConnected:
          type: boolean
      required: [userId, content, status, requestedAt, isConnected]
